name: CI

on:
  pull_request:
  push:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
          python-version: "3.12"

      - run: uv sync --all-extras --group dev
      - run: uv build
      - run: uv run twine check dist/*
      - run: |
          python -m venv /tmp/mcts-wheel-smoke
          /tmp/mcts-wheel-smoke/bin/pip install --quiet dist/*.whl
          /tmp/mcts-wheel-smoke/bin/mcts --version
          /tmp/mcts-wheel-smoke/bin/python -c "from mcts import Scanner, ScanConfig"
      - run: uv run ruff check .
      - run: uv run ruff format --check .
      - run: uv run python scripts/compile_sigma_rules.py --source tests/fixtures/sigma_fixtures --validate-min 6
      - run: uv run python scripts/compile_sigma_rules.py --check
      - run: uv run pytest -m "not integration"
      - run: uv run pytest -m integration tests/integration/
      - run: |
          uv run python - <<'PY'
          from mcts.testing.regression_harness import REGRESSION_THRESHOLD, REGRESSION_TECHNIQUES, evaluate_technique

          failures = []
          for technique_id in REGRESSION_TECHNIQUES:
              result = evaluate_technique(technique_id)
              if result.accuracy_pct < REGRESSION_THRESHOLD:
                  failures.append(
                      f"{technique_id}: {result.accuracy_pct}% "
                      f"(FP={result.false_positives}, FN={result.false_negatives})"
                  )
          if failures:
              raise SystemExit("Technique regression below threshold:\n" + "\n".join(failures))
          print(f"Regression gate passed for {len(REGRESSION_TECHNIQUES)} techniques (>={REGRESSION_THRESHOLD}%)")
          PY
      - run: |
          SARIF_OUT="${{ github.workspace }}/mcts-ci.sarif"
          uv run mcts scan examples/vulnerable-mcp-server/server.py --no-progress --format sarif -o "$SARIF_OUT"
          uv run python -c "import json; p=json.load(open('${SARIF_OUT}')); assert p.get('version') and p.get('runs'), 'invalid SARIF'"
      - run: uv run python -c "from pathlib import Path; from mcts.testing.regression_harness import write_regression_report; write_regression_report(Path('regression-report.json'))"
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: mcts-regression-report
          path: regression-report.json
