name: Bug Report
description: Report a bug in RedMCP
title: "[Bug]: "
labels: ["bug", "triage"]
body:
  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: Describe the bug and what you expected.
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Run `redmcp scan ...`
        2. See error
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: RedMCP version
      placeholder: 0.1.0
  - type: input
    id: python
    attributes:
      label: Python version
      placeholder: 3.12
