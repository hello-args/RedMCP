name: Feature Request
description: Suggest a new feature or analyzer
title: "[Feature]: "
labels: ["enhancement", "triage"]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What security gap or workflow pain does this solve?
    validations:
      required: true
  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
    validations:
      required: true
  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - Analyzer
        - CLI
        - Reporting
        - CI/CD Action
        - Documentation
        - Other
