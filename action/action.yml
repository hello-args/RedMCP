name: RedMCP Security Scan
description: Scan an MCP server for security vulnerabilities
branding:
  icon: shield
  color: red

inputs:
  target:
    description: Path to MCP server entrypoint
    required: true
    default: ./server.py
  fail-on-critical:
    description: Fail the workflow if critical findings exist
    required: false
    default: "true"

runs:
  using: composite
  steps:
    - name: Install RedMCP
      shell: bash
      run: pip install redmcp

    - name: Run security scan
      shell: bash
      run: |
        ARGS="${{ inputs.target }}"
        if [ "${{ inputs.fail-on-critical }}" = "true" ]; then
          redmcp scan "$ARGS" --fail-on-critical -o redmcp-report.json
        else
          redmcp scan "$ARGS" -o redmcp-report.json
        fi

    - name: Upload report
      uses: actions/upload-artifact@v4
      with:
        name: redmcp-report
        path: redmcp-report.json
