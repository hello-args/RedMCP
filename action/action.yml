name: MCTS Security Scan
description: Scan an MCP server for security vulnerabilities with JSON, SARIF, and HTML outputs
branding:
  icon: shield
  color: red

inputs:
  target:
    description: Path to MCP server entrypoint or repository directory
    required: true
    default: ./server.py
  fail-on-critical:
    description: Fail the workflow if critical findings exist
    required: false
    default: "true"
  min-score:
    description: Fail if legacy security score is below this value (0-100). Leave empty to skip.
    required: false
    default: ""
  scoring:
    description: Scoring mode — legacy, v2, or both (default both)
    required: false
    default: "both"
  min-security-score:
    description: Fail if v2 benchmark security score is below this value (requires scoring v2 or both)
    required: false
    default: ""
  max-absolute-risk:
    description: Fail if v2 absolute risk exceeds this value (requires scoring v2 or both)
    required: false
    default: ""
  max-risk-level:
    description: Fail if v2 risk level exceeds this band (low, medium, high, critical)
    required: false
    default: ""
  min-category-score-v2:
    description: >
      Comma-separated v2 OWASP category minimums (category:min, 100=good).
      Example injection:80,privilege:70
    required: false
    default: ""
  weights-profile:
    description: v2 weights profile (default manual_v1)
    required: false
    default: "manual_v1"
  assets-path:
    description: Optional .mcts/assets.yaml path for v2 asset-value overrides
    required: false
    default: ""
  extras:
    description: >
      Comma-separated pyproject optional extras (mcp, sast, supplychain, yara,
      llm, semgrep, api, all). Default installs mcp and sast for live probe and
      tree-sitter SAST.
    required: false
    default: "mcp,sast"
  findings-trust-mode:
    description: >
      Findings trust layer — off (default), warn, or enforce.
      enforce caps overlap-chain display severity and aligns gates with display counts.
      Prefer enforce for CI; warn does not relax fail-on-critical.
    required: false
    default: "off"
  ci-trust:
    description: >
      Shorthand for findings-trust-mode enforce with fail-on-critical (same as mcts --ci-trust).
    required: false
    default: "true"
  fail-on-priority-min:
    description: >
      Fail when any security finding priority_score is at or above this value (0-100).
    required: false
    default: ""
  min-evidence-strength:
    description: >
      With fail-on-priority-min, only count findings at or above this strength
      (weak, moderate, strong, verified).
    required: false
    default: ""
  max-high:
    description: Fail when high-severity findings exceed this count (enforce uses display counts).
    required: false
    default: ""
  max-critical:
    description: Fail when critical findings exceed this count (enforce uses display counts).
    required: false
    default: ""
  ignore-policy:
    description: Skip merging .mcts/policy.yaml into scan gates for this run.
    required: false
    default: "false"

runs:
  using: composite
  steps:
    - name: Set up uv
      uses: astral-sh/setup-uv@v7
      with:
        python-version: "3.12"
        enable-cache: true

    - name: Install MCTS
      shell: bash
      working-directory: ${{ github.action_path }}/..
      run: |
        set -euo pipefail
        EXTRAS="${{ inputs.extras }}"
        if [ "$EXTRAS" = "all" ]; then
          uv sync --frozen --no-dev --all-extras
        else
          ARGS=()
          IFS=',' read -ra PARTS <<< "$EXTRAS"
          for extra in "${PARTS[@]}"; do
            trimmed="$(echo "$extra" | xargs)"
            if [ -n "$trimmed" ]; then
              ARGS+=(--extra "$trimmed")
            fi
          done
          uv sync --frozen --no-dev "${ARGS[@]}"
        fi

    - name: Run security scan
      shell: bash
      working-directory: ${{ github.action_path }}/..
      run: |
        set -euo pipefail
        REPO_ROOT="${{ github.action_path }}/.."
        TARGET="${{ inputs.target }}"
        JSON_OUT="${{ github.workspace }}/mcts-report.json"
        SARIF_OUT="${{ github.workspace }}/mcts-report.sarif"
        HTML_OUT="${{ github.workspace }}/mcts-report.html"
        ARGS=(scan "$TARGET" --no-progress -o "$JSON_OUT")

        if [ "${{ inputs.fail-on-critical }}" = "true" ]; then
          ARGS+=(--fail-on-critical)
        fi
        if [ -n "${{ inputs.min-score }}" ]; then
          ARGS+=(--min-score "${{ inputs.min-score }}")
        fi
        if [ -n "${{ inputs.scoring }}" ] && [ "${{ inputs.scoring }}" != "legacy" ]; then
          ARGS+=(--scoring "${{ inputs.scoring }}")
        fi
        if [ -n "${{ inputs.min-security-score }}" ]; then
          ARGS+=(--min-security-score "${{ inputs.min-security-score }}")
        fi
        if [ -n "${{ inputs.max-absolute-risk }}" ]; then
          ARGS+=(--max-absolute-risk "${{ inputs.max-absolute-risk }}")
        fi
        if [ -n "${{ inputs.max-risk-level }}" ]; then
          ARGS+=(--max-risk-level "${{ inputs.max-risk-level }}")
        fi
        if [ -n "${{ inputs.min-category-score-v2 }}" ]; then
          IFS=',' read -ra V2_CAT_GATES <<< "${{ inputs.min-category-score-v2 }}"
          for gate in "${V2_CAT_GATES[@]}"; do
            trimmed="$(echo "$gate" | xargs)"
            if [ -n "$trimmed" ]; then
              ARGS+=(--min-category-score-v2 "$trimmed")
            fi
          done
        fi
        if [ -n "${{ inputs.weights-profile }}" ] && [ "${{ inputs.weights-profile }}" != "manual_v1" ]; then
          ARGS+=(--weights "${{ inputs.weights-profile }}")
        fi
        if [ -n "${{ inputs.assets-path }}" ]; then
          ARGS+=(--assets-path "${{ inputs.assets-path }}")
        fi
        if [ "${{ inputs.ci-trust }}" = "true" ]; then
          ARGS+=(--ci-trust)
        elif [ -n "${{ inputs.findings-trust-mode }}" ] && [ "${{ inputs.findings-trust-mode }}" != "off" ]; then
          ARGS+=(--findings-trust-mode "${{ inputs.findings-trust-mode }}")
        fi
        if [ -n "${{ inputs.fail-on-priority-min }}" ]; then
          ARGS+=(--fail-on-priority-min "${{ inputs.fail-on-priority-min }}")
        fi
        if [ -n "${{ inputs.min-evidence-strength }}" ]; then
          ARGS+=(--min-evidence-strength "${{ inputs.min-evidence-strength }}")
        fi
        if [ -n "${{ inputs.max-high }}" ]; then
          ARGS+=(--max-high "${{ inputs.max-high }}")
        fi
        if [ -n "${{ inputs.max-critical }}" ]; then
          ARGS+=(--max-critical "${{ inputs.max-critical }}")
        fi
        if [ "${{ inputs.ignore-policy }}" = "true" ]; then
          ARGS+=(--ignore-policy)
        fi

        uv run mcts "${ARGS[@]}"
        cp "$REPO_ROOT/mcts_analysis/scan-report.sarif" "$SARIF_OUT"
        cp "$REPO_ROOT/mcts_analysis/scan-report.html" "$HTML_OUT"

    - name: Upload JSON report
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: mcts-report-json
        path: mcts-report.json

    - name: Upload HTML dashboard
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: mcts-report-html
        path: mcts-report.html

    - name: Upload SARIF report
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: mcts-report-sarif
        path: mcts-report.sarif
